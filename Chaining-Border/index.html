<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chains of Method</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
    .cls {
        height: 300px;
        width: 300px;
        background-color: aquamarine;
        margin-bottom: 20px;
    }

    .borderStyle {
        border: 5px solid black;
    }
</style>

</head>

<body>
    <div class="cls"></div>

<button id="chain">Start Chains of Method</button>
<button id="addBorder">Add Border</button>

<script>
    $(document).ready(function () {

        // Method chaining
        $('#chain').click(function () {
            $('.cls')
                .hide(2000)
                .show(2000)
                .slideUp(2000)
                .slideDown(2000);
        });

        // Add border
        $('#addBorder').click(function () {
            $('.cls').addClass('borderStyle');
        });

    });
</script>

</body>
</html>
