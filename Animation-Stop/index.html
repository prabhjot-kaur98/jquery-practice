<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <style>
        .cls{
            height: 300px;
            width: 300px;
            background-color: aquamarine;
            position: fixed;
        }
    </style>
</head>
<body>
    <div class="cls"></div>
    <button id="ani">animate</button>
    <button id="s">stop</button>

</body>
<script>
    $(document).ready(function(){
        $('#ani').click(function(){
            $('.cls').animate(({left:'250px'}),2000)
        });
        $('#s').click(function(){
            $('.cls').stop();
        })
    });
</script>
</html>
